# docker-compose.prod.yml
# Production Docker Compose — uses pre-built images from the container registry.
# Uses env files from /home/suryansh/env/dcbrain-site/

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dcbrain-postgres
    env_file:
      - /home/suryansh/env/dcbrain-site/db.env
    ports:
      - "5435:5432"
    volumes:
      - /home/suryansh/env/dcbrain-site/postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dcbrain-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dcbrain-redis
    env_file:
      - /home/suryansh/env/dcbrain-site/db.env
    ports:
      - "6385:6379"
    volumes:
      - /home/suryansh/env/dcbrain-site/redis_data:/data
    networks:
      - dcbrain-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: dcbrain-chromadb
    env_file:
      - /home/suryansh/env/dcbrain-site/app.env
    ports:
      - "8005:8000"
    volumes:
      - /home/suryansh/env/dcbrain-site/chromadb_data:/chroma/chroma
    networks:
      - dcbrain-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: dcbrain-minio
    command: server /data --console-address ":9001"
    env_file:
      - /home/suryansh/env/dcbrain-site/minio.env
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - /home/suryansh/env/dcbrain-site/minio_data:/data
    networks:
      - dcbrain-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: dcbrain-neo4j
    env_file:
      - /home/suryansh/env/dcbrain-site/db.env
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - /home/suryansh/env/dcbrain-site/neo4j_data:/data
      - /home/suryansh/env/dcbrain-site/neo4j_logs:/logs
      - /home/suryansh/env/dcbrain-site/neo4j_import:/var/lib/neo4j/import
      - /home/suryansh/env/dcbrain-site/neo4j_plugins:/plugins
    networks:
      - dcbrain-network
    restart: unless-stopped

  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-suryanshvermaa}/dcbrain-backend:${IMAGE_TAG:-latest}
    container_name: dcbrain-backend
    env_file:
      - /home/suryansh/env/dcbrain-site/app.env
      - /home/suryansh/env/dcbrain-site/db.env
      - /home/suryansh/env/dcbrain-site/minio.env
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      chromadb:
        condition: service_started
      minio:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - dcbrain-network
    restart: unless-stopped

  worker:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-suryanshvermaa}/dcbrain-backend:${IMAGE_TAG:-latest}
    container_name: dcbrain-worker
    command: [ "node", "dist/worker.js" ]
    env_file:
      - /home/suryansh/env/dcbrain-site/app.env
      - /home/suryansh/env/dcbrain-site/db.env
      - /home/suryansh/env/dcbrain-site/minio.env
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      chromadb:
        condition: service_started
      minio:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - dcbrain-network
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-suryanshvermaa}/dcbrain-frontend:${IMAGE_TAG:-latest}
    container_name: dcbrain-frontend
    env_file:
      - /home/suryansh/env/dcbrain-site/app.env
    ports:
      - "3010:3000"
    depends_on:
      - backend
    networks:
      - dcbrain-network
    restart: unless-stopped

networks:
  dcbrain-network:
    driver: bridge
