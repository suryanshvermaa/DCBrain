# docker-compose.prod.yml
# Production Docker Compose — uses pre-built images from the container registry.
# Copy .env.prod.example → .env.prod, fill in secrets, then run:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dcbrain-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped
    # postgres is NOT exposed on host in production; only reachable inside network

  redis:
    image: redis:7-alpine
    container_name: dcbrain-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: dcbrain-chromadb
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
    networks:
      - dcbrain-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: dcbrain-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: dcbrain-neo4j
    environment:
      NEO4J_AUTH: neo4j/${GRAPH_DB_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${GRAPH_DB_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-dcbrain/dcbrain}-backend:${IMAGE_TAG:-latest}
    container_name: dcbrain-backend
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dcbrain-documents}
      GRAPH_DB_URL: bolt://neo4j:7687
      GRAPH_DB_USER: neo4j
      GRAPH_DB_PASSWORD: ${GRAPH_DB_PASSWORD}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Xenova/bge-small-en-v1.5}
      LOG_LEVEL: warning
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - dcbrain-network
    restart: unless-stopped

  worker:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-dcbrain/dcbrain}-backend:${IMAGE_TAG:-latest}
    container_name: dcbrain-worker
    command: ["node", "dist/worker.js"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dcbrain-documents}
      GRAPH_DB_URL: bolt://neo4j:7687
      GRAPH_DB_USER: neo4j
      GRAPH_DB_PASSWORD: ${GRAPH_DB_PASSWORD}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Xenova/bge-small-en-v1.5}
      BULLMQ_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      BULLMQ_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      BULLMQ_WORKER_CONCURRENCY: ${BULLMQ_WORKER_CONCURRENCY:-2}
      LOG_LEVEL: warning
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - dcbrain-network
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-dcbrain/dcbrain}-frontend:${IMAGE_TAG:-latest}
    container_name: dcbrain-frontend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - dcbrain-network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: dcbrain-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - dcbrain-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  minio_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  nginx_logs:

networks:
  dcbrain-network:
    driver: bridge
