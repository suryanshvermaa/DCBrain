# Server configuration for DCBrain
# Frontend: dcbrain.nebula-hack.tech
# Backend API: dcbrain-api.nebula-hack.tech
# Note: You can run `certbot --nginx -d dcbrain.nebula-hack.tech -d dcbrain-api.nebula-hack.tech` to add SSL manually.

upstream dcbrain_backend_upstream {
    server 127.0.0.1:8010;
    keepalive 32;
}

upstream dcbrain_frontend_upstream {
    server 127.0.0.1:3010;
    keepalive 16;
}

# ── Frontend Server (dcbrain.nebula-hack.tech) ───────────────────────────
server {
    listen 80;
    server_name dcbrain.nebula-hack.tech;
    
    client_max_body_size 1G;

    # Security headers
    add_header X-Frame-Options                "DENY" always;
    add_header X-Content-Type-Options         "nosniff" always;
    add_header X-XSS-Protection               "1; mode=block" always;
    add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy             "geolocation=(), microphone=(), camera=()" always;
    
    # CSP: Make sure to allow connections to your new API domain!
    add_header Content-Security-Policy        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://generativelanguage.googleapis.com https://dcbrain-api.nebula-hack.tech http://dcbrain-api.nebula-hack.tech wss://dcbrain-api.nebula-hack.tech;" always;

    add_header X-Request-ID $request_id always;

    location /_next/static/ {
        proxy_pass         http://dcbrain_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        expires         1y;
        add_header      Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://dcbrain_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 60s;
    }

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        add_header Content-Type application/json;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service Unavailable","message":"The server is temporarily unavailable. Please try again later."}';
        add_header Content-Type application/json;
    }
}


# ── Backend API Server (dcbrain-api.nebula-hack.tech) ────────────────────
server {
    listen 80;
    server_name dcbrain-api.nebula-hack.tech;

    client_max_body_size 1G;

    # Security headers
    add_header X-Frame-Options                "DENY" always;
    add_header X-Content-Type-Options         "nosniff" always;
    add_header X-XSS-Protection               "1; mode=block" always;
    add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
    
    add_header X-Request-ID $request_id always;

    # Health check
    location /health {
        proxy_pass         http://dcbrain_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout  10s;
        access_log off;
    }

    # WebSocket
    location /ws {
        proxy_pass         http://dcbrain_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All API routes
    location / {
        proxy_pass         http://dcbrain_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses (SSE, chat)
        proxy_buffering     off;
        proxy_cache_bypass  $http_upgrade;
    }

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        add_header Content-Type application/json;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service Unavailable","message":"The server is temporarily unavailable. Please try again later."}';
        add_header Content-Type application/json;
    }
}
