# =============================================================================
# DCBrain — Production Nginx Configuration
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length     256;
    client_max_body_size 110m;   # slightly above MAX_UPLOAD_SIZE_MB=100

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # API zone: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Auth zone: stricter — 2 requests/second per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;
    # General zone: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream backend_upstream {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name dcbrain.example.com;   # ← change to your domain

        # ── SSL/TLS ────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # ── Security headers ───────────────────────────────────────────────
        add_header Strict-Transport-Security      "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options                "DENY" always;
        add_header X-Content-Type-Options         "nosniff" always;
        add_header X-XSS-Protection               "1; mode=block" always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy             "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://generativelanguage.googleapis.com;" always;

        # Add a unique request ID for tracing
        add_header X-Request-ID $request_id always;

        # ── API routes → backend ───────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;

            # Disable buffering for streaming responses (SSE, chat)
            proxy_buffering     off;
            proxy_cache_bypass  $http_upgrade;
        }

        # ── Auth routes — extra rate limiting ─────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
        }

        # ── Health check (not rate-limited) ───────────────────────────────
        location /health {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_read_timeout  10s;
            access_log off;   # reduce noise from load-balancer probes
        }

        # ── Static assets — long cache ─────────────────────────────────────
        location /_next/static/ {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;

            expires         1y;
            add_header      Cache-Control "public, immutable";
        }

        # ── All other routes → Next.js frontend ───────────────────────────
        location / {
            limit_req zone=general_limit burst=50 nodelay;

            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            proxy_read_timeout 60s;
        }

        # ── Error pages ───────────────────────────────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service Unavailable","message":"The server is temporarily unavailable. Please try again later."}';
            add_header Content-Type application/json;
        }
    }
}
