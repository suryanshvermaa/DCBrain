services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dcbrain-postgres
    environment:
      POSTGRES_USER: dcbrain
      POSTGRES_PASSWORD: dcbrain_dev_password
      POSTGRES_DB: dcbrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dcbrain -d dcbrain" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dcbrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: dcbrain-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
    networks:
      - dcbrain-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: dcbrain-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: dcbrain-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - dcbrain-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dcbrain-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DATABASE_URL=postgresql://dcbrain:dcbrain_dev_password@postgres:5432/dcbrain
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - MINIO_BUCKET_NAME=dcbrain-documents
      - GRAPH_DB_URL=bolt://neo4j:7687
      - GRAPH_DB_USER=neo4j
      - GRAPH_DB_PASSWORD=password
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-flash-latest}
      - EMBEDDING_MODEL=text-embedding-3-small
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - dcbrain-network
    restart: unless-stopped
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dcbrain-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_APP_NAME=DCBrain
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      - backend
    networks:
      - dcbrain-network
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dcbrain-worker
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DATABASE_URL=postgresql://dcbrain:dcbrain_dev_password@postgres:5432/dcbrain
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - MINIO_BUCKET_NAME=dcbrain-documents
      - GRAPH_DB_URL=bolt://neo4j:7687
      - GRAPH_DB_USER=neo4j
      - GRAPH_DB_PASSWORD=password
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-flash-latest}
      - EMBEDDING_MODEL=text-embedding-3-small
      - BULLMQ_BROKER_URL=redis://redis:6379/1
      - BULLMQ_RESULT_BACKEND=redis://redis:6379/2
      - BULLMQ_WORKER_CONCURRENCY=2
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - dcbrain-network
    restart: unless-stopped
    command: npm run worker

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  minio_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:

networks:
  dcbrain-network:
    driver: bridge
